            tableName: QRTZ_TRIGGERS
            columns:
              - column:
                  name: SCHED_NAME
              - column:
                  name: CALENDAR_NAME

        - createIndex:
            indexName: IDX_QRTZ_T_G
            tableName: QRTZ_TRIGGERS
            columns:
              - column:
                  name: SCHED_NAME
