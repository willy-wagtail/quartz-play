        - createIndex:
            indexName: IDX_QRTZ_J_REQ_RECOVERY
            tableName: QRTZ_JOB_DETAILS
            columns:
              - column:
                  name: SCHED_NAME
              - column:
                  name: REQUESTS_RECOVERY

        - createIndex:
            indexName: IDX_QRTZ_J_GRP
            tableName: QRTZ_JOB_DETAILS
            columns:
              - column:
                  name: SCHED_NAME
              - column:
                  name: JOB_GROUP

        # QRTZ_TRIGGERS indexes
        - createIndex:
            indexName: IDX_QRTZ_T_J
            tableName: QRTZ_TRIGGERS
            columns:
              - column:
