databaseChangeLog:
  - changeSet:
      id: 1
      author: quartz
      comment: Create Quartz JDBC job store tables
      changes:
        - createTable:
            tableName: QRTZ_JOB_DETAILS
            columns:
              - column:
                  name: SCHED_NAME
                  type: varchar(120)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_JOB_DETAILS
              - column:
                  name: JOB_NAME
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_JOB_DETAILS
              - column:
                  name: JOB_GROUP
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_JOB_DETAILS
              - column:
                  name: DESCRIPTION
                  type: varchar(250)
              - column:
                  name: JOB_CLASS_NAME
                  type: varchar(250)
                  constraints:
                    nullable: false
              - column:
                  name: IS_DURABLE
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: IS_NONCONCURRENT
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: IS_UPDATE_DATA
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: REQUESTS_RECOVERY
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: JOB_DATA
                  type: blob

        - createTable:
            tableName: QRTZ_TRIGGERS
            columns:
              - column:
                  name: SCHED_NAME
                  type: varchar(120)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_TRIGGERS
              - column:
                  name: TRIGGER_NAME
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_TRIGGERS
              - column:
                  name: TRIGGER_GROUP
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_TRIGGERS
              - column:
                  name: JOB_NAME
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: JOB_GROUP
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: DESCRIPTION
                  type: varchar(250)
              - column:
                  name: NEXT_FIRE_TIME
                  type: bigint
              - column:
                  name: PREV_FIRE_TIME
                  type: bigint
              - column:
                  name: PRIORITY
                  type: int
              - column:
                  name: TRIGGER_STATE
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: TRIGGER_TYPE
                  type: varchar(8)
                  constraints:
                    nullable: false
              - column:
                  name: START_TIME
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: END_TIME
                  type: bigint
              - column:
                  name: CALENDAR_NAME
                  type: varchar(200)
              - column:
                  name: MISFIRE_INSTR
                  type: smallint
              - column:
                  name: JOB_DATA
                  type: blob

        - createTable:
            tableName: QRTZ_CRON_TRIGGERS
            columns:
              - column:
                  name: SCHED_NAME
                  type: varchar(120)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_CRON_TRIGGERS
              - column:
                  name: TRIGGER_NAME
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_CRON_TRIGGERS
              - column:
                  name: TRIGGER_GROUP
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_CRON_TRIGGERS
              - column:
                  name: CRON_EXPRESSION
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: TIME_ZONE_ID
                  type: varchar(80)

        - createTable:
            tableName: QRTZ_SIMPLE_TRIGGERS
            columns:
              - column:
                  name: SCHED_NAME
                  type: varchar(120)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_SIMPLE_TRIGGERS
              - column:
                  name: TRIGGER_NAME
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_SIMPLE_TRIGGERS
              - column:
                  name: TRIGGER_GROUP
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_SIMPLE_TRIGGERS
              - column:
                  name: REPEAT_COUNT
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: REPEAT_INTERVAL
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: TIMES_TRIGGERED
                  type: bigint
                  constraints:
                    nullable: false

        - createTable:
            tableName: QRTZ_SIMPROP_TRIGGERS
            columns:
              - column:
                  name: SCHED_NAME
                  type: varchar(120)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_SIMPROP_TRIGGERS
              - column:
                  name: TRIGGER_NAME
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_SIMPROP_TRIGGERS
              - column:
                  name: TRIGGER_GROUP
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_SIMPROP_TRIGGERS
              - column:
                  name: STR_PROP_1
                  type: varchar(512)
              - column:
                  name: STR_PROP_2
                  type: varchar(512)
              - column:
                  name: STR_PROP_3
                  type: varchar(512)
              - column:
                  name: INT_PROP_1
                  type: int
              - column:
                  name: INT_PROP_2
                  type: int
              - column:
                  name: LONG_PROP_1
                  type: bigint
              - column:
                  name: LONG_PROP_2
                  type: bigint
              - column:
                  name: DEC_PROP_1
                  type: decimal(13,4)
              - column:
                  name: DEC_PROP_2
                  type: decimal(13,4)
              - column:
                  name: BOOL_PROP_1
                  type: boolean
              - column:
                  name: BOOL_PROP_2
                  type: boolean

        - createTable:
            tableName: QRTZ_BLOB_TRIGGERS
            columns:
              - column:
                  name: SCHED_NAME
                  type: varchar(120)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_BLOB_TRIGGERS
              - column:
                  name: TRIGGER_NAME
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_BLOB_TRIGGERS
              - column:
                  name: TRIGGER_GROUP
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_BLOB_TRIGGERS
              - column:
                  name: BLOB_DATA
                  type: blob

        - createTable:
            tableName: QRTZ_CALENDARS
            columns:
              - column:
                  name: SCHED_NAME
                  type: varchar(120)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_CALENDARS
              - column:
                  name: CALENDAR_NAME
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_CALENDARS
              - column:
                  name: CALENDAR
                  type: blob
                  constraints:
                    nullable: false

        - createTable:
            tableName: QRTZ_PAUSED_TRIGGER_GRPS
            columns:
              - column:
                  name: SCHED_NAME
                  type: varchar(120)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_PAUSED_TRIGGER_GRPS
              - column:
                  name: TRIGGER_GROUP
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_PAUSED_TRIGGER_GRPS

        - createTable:
            tableName: QRTZ_FIRED_TRIGGERS
            columns:
              - column:
                  name: SCHED_NAME
                  type: varchar(120)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_FIRED_TRIGGERS
              - column:
                  name: ENTRY_ID
                  type: varchar(95)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_FIRED_TRIGGERS
              - column:
                  name: TRIGGER_NAME
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: TRIGGER_GROUP
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: INSTANCE_NAME
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: FIRED_TIME
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: SCHED_TIME
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: PRIORITY
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: STATE
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: JOB_NAME
                  type: varchar(200)
              - column:
                  name: JOB_GROUP
                  type: varchar(200)
              - column:
                  name: IS_NONCONCURRENT
                  type: boolean
              - column:
                  name: REQUESTS_RECOVERY
                  type: boolean

        - createTable:
            tableName: QRTZ_SCHEDULER_STATE
            columns:
              - column:
                  name: SCHED_NAME
                  type: varchar(120)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_SCHEDULER_STATE
              - column:
                  name: INSTANCE_NAME
                  type: varchar(200)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_SCHEDULER_STATE
              - column:
                  name: LAST_CHECKIN_TIME
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: CHECKIN_INTERVAL
                  type: bigint
                  constraints:
                    nullable: false

        - createTable:
            tableName: QRTZ_LOCKS
            columns:
              - column:
                  name: SCHED_NAME
                  type: varchar(120)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_LOCKS
              - column:
                  name: LOCK_NAME
                  type: varchar(40)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: PK_QRTZ_LOCKS

  - changeSet:
      id: 2
      author: quartz
      comment: Add foreign key constraints for Quartz tables
      changes:
        - addForeignKeyConstraint:
            constraintName: FK_QRTZ_TRIGGERS_JOB_DETAILS
            baseTableName: QRTZ_TRIGGERS
            baseColumnNames: SCHED_NAME,JOB_NAME,JOB_GROUP
            referencedTableName: QRTZ_JOB_DETAILS
            referencedColumnNames: SCHED_NAME,JOB_NAME,JOB_GROUP

        - addForeignKeyConstraint:
            constraintName: FK_QRTZ_CRON_TRIGGERS_TRIGGERS
            baseTableName: QRTZ_CRON_TRIGGERS
            baseColumnNames: SCHED_NAME,TRIGGER_NAME,TRIGGER_GROUP
            referencedTableName: QRTZ_TRIGGERS
            referencedColumnNames: SCHED_NAME,TRIGGER_NAME,TRIGGER_GROUP
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: FK_QRTZ_SIMPLE_TRIGGERS_TRIGGERS
            baseTableName: QRTZ_SIMPLE_TRIGGERS
            baseColumnNames: SCHED_NAME,TRIGGER_NAME,TRIGGER_GROUP
            referencedTableName: QRTZ_TRIGGERS
            referencedColumnNames: SCHED_NAME,TRIGGER_NAME,TRIGGER_GROUP
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: FK_QRTZ_SIMPROP_TRIGGERS_TRIGGERS
            baseTableName: QRTZ_SIMPROP_TRIGGERS
            baseColumnNames: SCHED_NAME,TRIGGER_NAME,TRIGGER_GROUP
            referencedTableName: QRTZ_TRIGGERS
            referencedColumnNames: SCHED_NAME,TRIGGER_NAME,TRIGGER_GROUP
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: FK_QRTZ_BLOB_TRIGGERS_TRIGGERS
            baseTableName: QRTZ_BLOB_TRIGGERS
            baseColumnNames: SCHED_NAME,TRIGGER_NAME,TRIGGER_GROUP
            referencedTableName: QRTZ_TRIGGERS
            referencedColumnNames: SCHED_NAME,TRIGGER_NAME,TRIGGER_GROUP
            onDelete: CASCADE

  - changeSet:
      id: 3
      author: quartz
