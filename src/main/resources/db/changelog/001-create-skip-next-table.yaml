databaseChangeLog:
  - changeSet:
      id: 001-create-skip-next-table
      author: willy
      comment: >-
        Stores job names whose next cron firing should be skipped.
        A row present means skip-next is pending. SkipNextTriggerListener
        checks this table on every cron firing — if a row exists, it vetoes
        the execution and deletes the row so subsequent firings proceed normally.
        This table is separate from Quartz's JobDataMap by design: skip-next is
        application behavior (a toggle flag), not scheduling metadata. A dedicated
        table gives simple INSERT/DELETE semantics vs re-serializing the entire map.
      changes:
        - createTable:
            tableName: SKIP_NEXT
            columns:
              - column:
                  name: JOB_NAME
                  type: VARCHAR(200)
                  constraints:
                    primaryKey: true
                    nullable: false
