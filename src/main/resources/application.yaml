spring:
  application:
    name: quartz-play

  datasource:
    url: jdbc:h2:mem:quartzdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    scheduler-name: QuartzPlayScheduler
    overwrite-existing-jobs: true # Needed when using a persistent DB (e.g. PostgreSQL)
    properties:
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.clusterCheckinInterval: 10000 # 10 seconds
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.threadPool.threadCount: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,quartz
  endpoint:
    quartz:
      show-details: always

app:
  jobs:
    example-job-cron: "0/30 * * * * ?" # Every 30 seconds
