spring:
  application:
    name: quartz-play

  datasource:
    url: jdbc:h2:mem:quartzdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  kafka:
    consumer:
      auto-offset-reset: latest

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    overwrite-existing-jobs: false
    properties:
      org.quartz.jobStore.isClustered: true
      org.quartz.scheduler.instanceName: QuartzPlayScheduler
      org.quartz.scheduler.instanceId: AUTO

management:
  endpoints:
    web:
      exposure:
        include: health,info,quartz
  endpoint:
    quartz:
      show-details: always

app:
  jobs:
    example-job:
      cron: "0 0 * * * ?" # Every hour
      timezone: UTC
    automation-job:
      cron: "0 */5 * * * ?" # Every 5 minutes
      timezone: UTC
  kafka:
    interrupt-topic:
      name: job-interrupts
      partitions: 1
      replication-factor: 1
